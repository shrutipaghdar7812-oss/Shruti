<!DOCTYPE html>
<html>
<head>

header{

.container{

}

.card{
background:white;
width:250px;

}

.card img{
width:100%;
height:180px;
object-fit:cover;

}

.card h3{

}

.btn{
background:#2e7d32;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* Footer */
footer{

color:white;
text-align:center;
padding:10px;
